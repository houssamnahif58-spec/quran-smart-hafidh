<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran Challenge</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  margin: 0;
}

/* Header */
.header {
  padding: 15px;
  font-size: 20px;
  background: #0f172a;
}

/* Cards */
.card {
  background: #1e293b;
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
}

/* Text */
#text {
  font-size: 22px;
  line-height: 2;
}

/* Wrong words */
.wrong {
  background: red;
  padding: 3px;
  border-radius: 5px;
}

/* Buttons */
button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 5px;
  background: #22c55e;
  color: white;
}

/* Progress */
.bar {
  height: 10px;
  background: lime;
  width: 0%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">📖 Quran Challenge</div>

<div class="card">
<h3>📅 الحزب الحالي</h3>
<p id="hizb">حزب 1</p>
</div>

<div class="card">
<h3>📖 النص</h3>
<p id="text"></p>

<button onclick="hideWords()">🧠 إخفاء كلمات</button>
</div>

<div class="card">
<h3>🎤 اقرأ</h3>
<button onclick="startRec()">ابدأ</button>
<p id="result"></p>
</div>

<div class="card">
<h3>📊 التقدم</h3>
<div style="background:#333;border-radius:10px;">
<div id="bar" class="bar"></div>
</div>
<p id="percent"></p>
</div>

<div class="card">
<h3>🏆 النقاط</h3>
<p id="points">0</p>
</div>

<script>

// ===== بيانات تجريبية =====
let hizbData = [
"بسم الله الرحمن الرحيم الحمد لله رب العالمين",
"الرحمن الرحيم مالك يوم الدين"
];

// ===== حالة =====
let index = 0;
let points = 0;
let hidden = false;

// ===== عرض =====
function update() {
  document.getElementById("hizb").innerText = "حزب " + (index+1);
  document.getElementById("text").innerText = hizbData[index];

  let percent = Math.floor((index / 60) * 100);
  document.getElementById("percent").innerText = percent + "%";
  document.getElementById("bar").style.width = percent + "%";
}

update();

// ===== إخفاء كلمات =====
function hideWords() {
  let words = hizbData[index].split(" ");

  if (!hidden) {
    words = words.map(w => Math.random() > 0.7 ? "____" : w);
    hidden = true;
  } else {
    words = hizbData[index].split(" ");
    hidden = false;
  }

  document.getElementById("text").innerText = words.join(" ");
}

// ===== ميكروفون =====
let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.lang = "ar-SA";

function startRec() {
  rec.start();
}

rec.onresult = function(e) {
  let user = e.results[0][0].transcript;
  document.getElementById("result").innerText = user;

  compare(user, hizbData[index]);
};

// ===== مقارنة حرفية =====
function compare(user, correct) {

  let u = user.split(" ");
  let c = correct.split(" ");

  let result = "";

  for (let i = 0; i < c.length; i++) {
    if (u[i] !== c[i]) {
      result += `<span class="wrong">${c[i]}</span> `;
    } else {
      result += c[i] + " ";
    }
  }

  document.getElementById("text").innerHTML = result;

  if (user.length > correct.length * 0.7) {
    points += 10;
    index++;
    update();
  }
}

// إشعار
setInterval(() => {
  alert("📢 راجع حزب " + (Math.floor(Math.random()*index)+1));
}, 60000);

</script>

</body>
</html>
