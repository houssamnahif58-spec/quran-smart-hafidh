<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran AI Pro</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px;
  border-radius: 15px;
}

button, select {
  padding: 10px;
  border-radius: 10px;
  margin: 5px;
}

.hidden-word {
  background: black;
  color: black;
  border-radius: 5px;
  padding: 2px 5px;
}
</style>
</head>

<body>

<h1>📖 Quran AI Pro</h1>

<div class="card">
<h2>📖 عرض القرآن</h2>

<select onchange="loadSurah(this.value)">
  <option value="1">الفاتحة</option>
  <option value="112">الإخلاص</option>
  <option value="113">الفلق</option>
  <option value="114">الناس</option>
</select>

<button onclick="toggleHide()">🧠 إخفاء كلمات</button>

<p id="quranText"></p>
</div>

<div class="card">
<h2>🎤 اقرأ</h2>
<button onclick="startRec()">ابدأ</button>
<p id="result"></p>
</div>

<script>

// ===== تحميل السورة =====
async function loadSurah(id) {
  let res = await fetch("https://api.alquran.cloud/v1/surah/" + id);
  let data = await res.json();

  let text = data.data.ayahs.map(a => a.text).join(" ");

  window.currentText = text;
  document.getElementById("quranText").innerText = text;
}

// ===== إخفاء كلمات =====
let hidden = false;

function toggleHide() {
  let words = currentText.split(" ");

  if (!hidden) {
    words = words.map(w => Math.random() > 0.7 ? "____" : w);
    hidden = true;
  } else {
    words = currentText.split(" ");
    hidden = false;
  }

  document.getElementById("quranText").innerText = words.join(" ");
}

// ===== ميكروفون =====
let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = "ar-SA";

function startRec() {
  recognition.start();
}

recognition.onresult = function(e) {
  let user = e.results[0][0].transcript;
  document.getElementById("result").innerText = user;

  check(user);
};

// ===== مقارنة بسيطة =====
function check(user) {
  if (!currentText) return;

  let score = similarity(user, currentText);

  if (score > 0.5) {
    alert("✅ جيد");
  } else {
    alert("❌ فيه أخطاء");
  }
}

// ===== similarity =====
function similarity(a, b) {
  let same = 0;
  for (let i = 0; i < Math.min(a.length, b.length); i++) {
    if (a[i] === b[i]) same++;
  }
  return same / b.length;
}

// تحميل أول سورة
loadSurah(1);

</script>

</body>
</html>
