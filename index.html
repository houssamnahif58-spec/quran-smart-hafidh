<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quran Smart Hafidh</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}
.card {
  background: #1e293b;
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
}
button, select {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}
button { background: green; color: white; }
</style>
</head>

<body>

<h1>📖 Quran Smart Hafidh</h1>

<div class="card">
<h2>📅 مهمة اليوم</h2>
<p id="surah">الناس</p>
<button onclick="done()">✅ حفظت</button>
</div>

<div class="card">
<h2>🏆 النقاط</h2>
<p id="points">0</p>
<h3>🔥 المستوى: <span id="level">1</span></h3>
</div>

<div class="card">
<h2>🎧 القارئ</h2>
<select onchange="changeReciter(this.value)">
<option value="afasy">العفاسي</option>
<option value="sudais">السديس</option>
</select>

<audio id="audio" controls></audio>
</div>

<div class="card">
<h2>🎤 اقرأ الآن</h2>
<button onclick="startRec()">🎙️ ابدأ</button>
<p id="result"></p>
</div>

<script>

// ===== البيانات =====
const surahs = [
{ name: "الناس", text: "قل أعوذ برب الناس", audio: "114.mp3" },
{ name: "الفلق", text: "قل أعوذ برب الفلق", audio: "113.mp3" },
{ name: "الإخلاص", text: "قل هو الله أحد", audio: "112.mp3" }
];

let index = 0;
let points = 0;
let level = 1;
let reciter = "afasy";

const audio = document.getElementById("audio");

// ===== تحديث الصوت =====
function updateAudio() {
  audio.src =
  "https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/" +
  surahs[index].audio;
}
updateAudio();

// ===== حفظ =====
function done() {
  points += 10;
  index++;

  if (index % 3 === 0) level++;

  document.getElementById("points").innerText = points;
  document.getElementById("level").innerText = level;

  if (surahs[index]) {
    document.getElementById("surah").innerText = surahs[index].name;
    updateAudio();
  } else {
    document.getElementById("surah").innerText = "🎉 ختمت!";
  }
}

// ===== تغيير القارئ =====
function changeReciter(val) {
  reciter = val;
  updateAudio();
}

// ===== الميكروفون =====
let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = "ar-SA";

function startRec() {
  recognition.start();
}

recognition.onresult = function(event) {
  let user = event.results[0][0].transcript;
  document.getElementById("result").innerText = "قلت: " + user;

  check(user);
};

// ===== التصحيح =====
function check(user) {
  let correct = surahs[index].text;

  if (user.includes(correct)) {
    points += 5;
    alert("✅ قراءة صحيحة!");
  } else {
    alert("❌ عندك خطأ، حاول مرة أخرى");
  }

  document.getElementById("points").innerText = points;
}

// ===== إشعارات =====
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

setInterval(() => {
  new Notification("📢 راجع سورة " + surahs[Math.floor(Math.random()*surahs.length)].name);
}, 30000);

</script>

</body>
</html>
