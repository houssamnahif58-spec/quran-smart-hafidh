<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran Smart Hafidh PRO</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px;
  border-radius: 15px;
}

button, select {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

button { background: green; color: white; }

.progress {
  width: 100%;
  background: #333;
  border-radius: 10px;
}

.progress-bar {
  height: 10px;
  background: lime;
  width: 0%;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>📖 Quran Smart Hafidh PRO</h1>

<div class="card">
<h2>📅 مهمة اليوم</h2>
<p id="surah"></p>
<button onclick="done()">✅ حفظت</button>
</div>

<div class="card">
<h2>📊 التقدم</h2>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
<p id="percent">0%</p>
</div>

<div class="card">
<h2>🏆 النقاط</h2>
<p id="points">0</p>
<h3>🔥 المستوى: <span id="level">1</span></h3>
</div>

<div class="card">
<h2>🎧 القارئ</h2>
<select onchange="changeReciter(this.value)">
<option value="afasy">العفاسي</option>
<option value="sudais">السديس</option>
</select>
<audio id="audio" controls></audio>
</div>

<div class="card">
<h2>🎤 اقرأ</h2>
<button onclick="startRec()">🎙️ ابدأ</button>
<p id="result"></p>
</div>

<script>

// ===== بيانات =====
const surahs = [
{ name:"الناس", text:"قل أعوذ برب الناس", audio:"114.mp3" },
{ name:"الفلق", text:"قل أعوذ برب الفلق", audio:"113.mp3" },
{ name:"الإخلاص", text:"قل هو الله أحد", audio:"112.mp3" }
];

let index = localStorage.getItem("index") || 0;
let points = localStorage.getItem("points") || 0;
let level = localStorage.getItem("level") || 1;

const audio = document.getElementById("audio");

// ===== تحديث =====
function updateUI() {
  document.getElementById("surah").innerText = surahs[index].name;
  document.getElementById("points").innerText = points;
  document.getElementById("level").innerText = level;

  let percent = Math.floor((index / surahs.length) * 100);
  document.getElementById("percent").innerText = percent + "%";
  document.getElementById("bar").style.width = percent + "%";

  audio.src =
  "https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/" +
  surahs[index].audio;
}

updateUI();

// ===== حفظ =====
function done() {
  points = parseInt(points) + 10;
  index++;

  if (index % 2 === 0) level++;

  save();
  updateUI();
}

// ===== حفظ البيانات =====
function save() {
  localStorage.setItem("index", index);
  localStorage.setItem("points", points);
  localStorage.setItem("level", level);
}

// ===== ميكروفون =====
let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = "ar-SA";

function startRec() {
  recognition.start();
}

recognition.onresult = function(e) {
  let user = e.results[0][0].transcript;
  document.getElementById("result").innerText = user;

  check(user);
};

// ===== مقارنة محسنة =====
function check(user) {
  let correct = surahs[index].text;

  let similarity = user.includes(correct);

  if (similarity) {
    points += 5;
    alert("✅ ممتاز!");
  } else {
    alert("❌ فيه خطأ، ركز أكثر");
  }

  save();
  updateUI();
}

// ===== إشعارات =====
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

setInterval(() => {
  new Notification("📢 راجع سورة " + surahs[Math.floor(Math.random()*surahs.length)].name);
}, 60000);

</script>

</body>
</html>
