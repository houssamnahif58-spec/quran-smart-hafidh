<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quran Hafidh PRO+</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(#0f172a,#020617);
  color: white;
  text-align: center;
}

.card {
  background: rgba(30,41,59,0.8);
  padding: 20px;
  margin: 10px;
  border-radius: 20px;
}

button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin: 5px;
}

.primary { background: #22c55e; color: white; }
.locked { background: gray; }

.progress {
  background: #1e293b;
  border-radius: 10px;
}
.bar {
  height: 10px;
  background: #22c55e;
  width: 0%;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>📖 Quran Hafidh PRO+</h1>

<div class="card">
<h2>📅 حزب اليوم</h2>
<p id="current">حزب 1</p>

<button onclick="startRec()">🎤 اقرأ</button>
<button id="doneBtn" class="locked" onclick="done()" disabled>✅ حفظت</button>
</div>

<div class="card">
<h2>📊 التقدم</h2>
<div class="progress"><div id="bar" class="bar"></div></div>
<p id="percent">0%</p>
</div>

<div class="card">
<h2>🏆 النقاط</h2>
<p id="points">0</p>
<h3>🔥 المستوى: <span id="level">1</span></h3>
</div>

<script>

// ===== الأحزاب =====
let total = 60;
let index = localStorage.getItem("index") || 0;
let points = localStorage.getItem("points") || 0;
let level = localStorage.getItem("level") || 1;

let correctRead = false;

// ===== تحديث =====
function updateUI() {
  document.getElementById("current").innerText = "حزب " + (parseInt(index)+1);
  document.getElementById("points").innerText = points;
  document.getElementById("level").innerText = level;

  let percent = Math.floor((index / total) * 100);
  document.getElementById("percent").innerText = percent + "%";
  document.getElementById("bar").style.width = percent + "%";
}
updateUI();

// ===== ميكروفون =====
let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
recognition.lang = "ar-SA";

function startRec() {
  recognition.start();
}

recognition.onresult = function(e) {
  let text = e.results[0][0].transcript;

  // شرط بسيط (يمكن تطويره)
  if (text.length > 10) {
    correctRead = true;
    alert("✅ قراءة مقبولة");

    document.getElementById("doneBtn").disabled = false;
    document.getElementById("doneBtn").classList.remove("locked");
    document.getElementById("doneBtn").classList.add("primary");
  } else {
    alert("❌ القراءة قصيرة، حاول مرة أخرى");
  }
};

// ===== حفظ =====
function done() {
  if (!correctRead) return;

  index++;
  points += 10;

  if (index % 5 === 0) level++;

  save();
  correctRead = false;

  document.getElementById("doneBtn").disabled = true;
  document.getElementById("doneBtn").classList.add("locked");

  updateUI();
}

// ===== حفظ البيانات =====
function save() {
  localStorage.setItem("index", index);
  localStorage.setItem("points", points);
  localStorage.setItem("level", level);
}

// ===== إشعارات =====
if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

setInterval(() => {
  new Notification("📢 راجع حزب " + (Math.floor(Math.random()*index)+1));
}, 60000);

</script>

</body>
</html>
